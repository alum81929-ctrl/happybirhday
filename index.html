<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 С ДНЁМ РОЖДЕНИЯ! 🎂</title>
    <style>
        /* Стили чтобы было красиво (можно оставить свои) */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fff0f5;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .emoji-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            font-size: 3rem;
            margin: 20px 0;
            cursor: pointer;
        }
        .emoji-item {
            transition: transform 0.2s;
            padding: 10px;
            border-radius: 20px;
            background: #f8f8ff;
            min-width: 80px;
        }
        .emoji-item:active {
            transform: scale(0.8);
        }
        .coin {
            font-size: 4rem;
            background: gold;
            border-radius: 50%;
            padding: 15px;
            display: inline-block;
            margin: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .coin:active {
            transform: scale(0.7);
        }
        h1 {
            color: #ff6b6b;
        }
        .subtitle {
            font-size: 1.5rem;
            color: #4ecdc4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎂 С ДНЁМ РОЖДЕНИЯ! 🎂</h1>
        <p class="subtitle">⭐ Моему любимому брату! ⭐</p>
        <p>🎈🎁🌟</p>
        <p><strong>Тебе уже 5 лет!</strong></p>
        <p>Ты самый сильный и умный! 🦸♂️</p>
        
        <!-- Монетка -->
        <div class="coin" data-sound="coin">💰 <span id="coinCount">0</span></div>

        <!-- Все эмодзи -->
        <div class="emoji-grid" id="emojiContainer">
            <div class="emoji-item" data-sound="dog">🐶</div>
            <div class="emoji-item" data-sound="cat">🐱</div>
            <div class="emoji-item" data-sound="panda">🐼</div>
            <div class="emoji-item" data-sound="koala">🐨</div>
            <div class="emoji-item" data-sound="fox">🦊</div>
            <div class="emoji-item" data-sound="frog">🐸</div>
            <div class="emoji-item" data-sound="penguin">🐧</div>
            <div class="emoji-item" data-sound="unicorn">🦄</div>
        </div>
        
        <p style="margin-top: 30px; font-size: 0.8rem; color: #aaa;">Нажми на любой эмодзи или монетку — услышишь звук!</p>
    </div>

    <script>
        // 📢 Список звуков: ключ (data-sound) -> имя файла в папке audio
        const soundMap = {
            'coin': 'coin.mp3',       // Звук монетки
            'dog': 'dog.mp3',         // Собака
            'cat': 'cat.mp3',         // Кошка
            'panda': 'panda.mp3',     // Панда
            'koala': 'koala.mp3',     // Коала
            'fox': 'fox.mp3',         // Лиса
            'frog': 'frog.mp3',       // Лягушка
            'penguin': 'penguin.mp3', // Пингвин
            'unicorn': 'unicorn.mp3'  // Единорог
        };

        // Функция для проигрывания звука
        function playSound(soundKey) {
            const fileName = soundMap[soundKey];
            if (!fileName) {
                console.warn(`Звук для "${soundKey}" не найден в soundMap`);
                return;
            }

            const audio = new Audio(`audio/${fileName}`);
            audio.play().catch(error => {
                // Если звук не загрузился (например, нет файла)
                console.error('Ошибка воспроизведения:', error);
                alert(`Звук "${fileName}" не найден в папке audio!`);
            });
        }

        // ----- Обработчики для всех элементов с data-sound -----
        // 1. Монетка (отдельно, т.к. у неё ещё счётчик)
        const coinElement = document.querySelector('.coin');
        if (coinElement) {
            coinElement.addEventListener('click', function(event) {
                // Не даём клику всплыть наверх, чтобы не сработало дважды
                event.stopPropagation();
                // Проигрываем звук
                const soundKey = this.dataset.sound;
                playSound(soundKey);

                // Увеличиваем счётчик (логика с монетками)
                const countSpan = document.getElementById('coinCount');
                let currentCount = parseInt(countSpan.textContent, 10);
                countSpan.textContent = currentCount + 1;
            });
        }

        // 2. Все элементы в сетке эмодзи
        const emojiItems = document.querySelectorAll('.emoji-item');
        emojiItems.forEach(item => {
            item.addEventListener('click', function(event) {
                event.stopPropagation();
                const soundKey = this.dataset.sound;
                playSound(soundKey);
            });
        });

        // 3. Для всех остальных элементов, которые могут иметь data-sound (на будущее)
        document.querySelectorAll('[data-sound]').forEach(el => {
            // Чтобы не повесить обработчик дважды на уже обработанные элементы
            if (!el.classList.contains('coin') && !el.classList.contains('emoji-item')) {
                el.addEventListener('click', function(event) {
                    event.stopPropagation();
                    playSound(this.dataset.sound);
                });
            }
        });

        // Небольшая подсказка в консоль, что всё работает
        console.log('🎵 Звуки готовы! Добавьте файлы в папку audio:', Object.values(soundMap));
    </script>
</body>
</html>
