<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С днём рождения, брат! 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            margin: 0;
            touch-action: manipulation;
            overflow-x: hidden;
            position: relative;
            transition: background 0.5s ease;
        }

        body.night-mode {
            background: linear-gradient(135deg, #0c0c1a 0%, #1a1a2e 100%);
        }

        body.night-mode .card {
            background: rgba(30, 30, 60, 0.95);
            border-color: rgba(255,255,255,0.1);
        }

        body.night-mode .card::before {
            background: linear-gradient(45deg, #f093fb, #f5576c, #4facfe, #43e97b);
        }

        body.night-mode h1 {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body.night-mode .subhead {
            background: linear-gradient(135deg, #2d2d4a, #3d3d5a);
            color: #f0e8d0;
        }

        body.night-mode .message {
            background: linear-gradient(135deg, #2d2d4a, #3d3d5a);
            color: #f0e8d0;
            border-color: rgba(255,255,255,0.1);
        }

        body.night-mode .clicker-section,
        body.night-mode .game-area,
        body.night-mode .rating-section {
            background: linear-gradient(135deg, #2d2d4a, #3d3d5a);
            border-color: rgba(255,255,255,0.1);
        }

        body.night-mode .clicker-title,
        body.night-mode .rating-title {
            color: #f0e8d0;
        }

        body.night-mode .animal-card {
            background: #3d3d5a;
            border-color: #5d5d7a;
        }

        body.night-mode .animal-card .animal-label {
            color: #f0e8d0;
            background: rgba(255,255,255,0.1);
        }

        body.night-mode .animal-card .sound-name {
            color: #b0a8a0;
        }

        body.night-mode .footer {
            background: linear-gradient(135deg, #2d2d4a, #3d3d5a);
            color: #f0e8d0;
            border-color: rgba(255,255,255,0.1);
        }

        body.night-mode .rating-btn {
            background: #3d3d5a;
            border-color: #5d5d7a;
            color: #f0e8d0;
        }

        body.night-mode .rating-btn .label {
            color: #f0e8d0;
        }

        body.night-mode .clicker-counter {
            background: #3d3d5a;
            color: #f0e8d0;
            border-color: #5d5d7a;
        }

        body.night-mode .btn {
            background: #3d3d5a;
            color: #f0e8d0;
            border-color: rgba(255,255,255,0.1);
        }

        .floating-balls {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .ball {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: floatBall linear infinite;
        }

        @keyframes floatBall {
            0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-100vh) rotate(720deg) scale(1); opacity: 0; }
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 50px 20px 50px 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
            padding: 30px 22px 35px;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: cardAppear 0.6s ease;
            transition: background 0.5s ease;
        }

        @keyframes cardAppear {
            0% { transform: scale(0.8) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 52px 22px 52px 22px;
            background: linear-gradient(45deg, #f093fb, #f5576c, #4facfe, #43e97b);
            background-size: 400% 400%;
            z-index: -1;
            animation: gradientBorder 3s ease infinite;
            transition: background 0.5s ease;
        }

        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.3s;
            user-select: none;
            padding: 5px 0;
            position: relative;
            z-index: 1;
        }

        h1:hover { transform: scale(1.05); }
        h1:active { transform: scale(0.95); }

        .subhead {
            font-size: 1.4rem;
            font-weight: bold;
            color: #6b4c3b;
            background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
            display: inline-block;
            padding: 8px 28px;
            border-radius: 50px;
            margin: 8px 0 12px;
            box-shadow: 0 4px 15px rgba(253, 203, 110, 0.4);
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
            position: relative;
            z-index: 1;
        }

        .subhead:hover { transform: scale(1.05); box-shadow: 0 6px 25px rgba(253, 203, 110, 0.5); }
        .subhead:active { transform: scale(0.95); }

        .emoji-big {
            font-size: 4rem;
            line-height: 1.3;
            margin: 5px 0 10px;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .emoji-big span {
            display: inline-block;
            transition: transform 0.3s;
        }

        .emoji-big span:hover { transform: scale(1.2) rotate(-10deg); }
        .emoji-big:active { transform: scale(0.9); }

        .message {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fef9f0, #fdf6e8);
            padding: 20px 22px;
            border-radius: 40px 12px 40px 12px;
            border: 3px solid rgba(253, 203, 110, 0.3);
            color: #4a3525;
            margin: 12px 0 18px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            line-height: 1.5;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
            position: relative;
            z-index: 1;
        }

        .message:hover { transform: scale(1.02); border-color: rgba(253, 203, 110, 0.6); }
        .message:active { transform: scale(0.97); }

        .message span {
            background: linear-gradient(135deg, #f9caa7, #f8a87a);
            padding: 0 16px;
            border-radius: 30px;
            font-size: 2.4rem;
            display: inline-block;
            color: #5a2d1a;
            box-shadow: 0 4px 10px rgba(248, 168, 122, 0.3);
        }

        /* ===== ТОП-ПАНЕЛЬ ===== */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .top-btn {
            background: rgba(255,255,255,0.3);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50px;
            padding: 6px 14px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
            touch-action: manipulation;
            color: #5a4030;
            font-weight: bold;
        }

        .top-btn:hover { transform: scale(1.05); background: rgba(255,255,255,0.5); }
        .top-btn:active { transform: scale(0.95); }

        body.night-mode .top-btn {
            background: rgba(255,255,255,0.1);
            color: #f0e8d0;
            border-color: rgba(255,255,255,0.2);
        }

        .clicker-section {
            background: linear-gradient(135deg, #f8f0e3, #f5e8d5);
            border-radius: 40px 15px 40px 15px;
            padding: 18px 15px 20px;
            margin: 15px 0 18px;
            border: 3px solid rgba(253, 203, 110, 0.3);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 1;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        .clicker-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(253, 203, 110, 0.05) 0%, transparent 70%);
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30%, 30%); }
        }

        .clicker-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #5a4030;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .clicker-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .clicker-button {
            background: linear-gradient(145deg, #ffd93d, #f6b93b);
            border: none;
            border-radius: 60px;
            padding: 18px 35px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #2d1f14;
            box-shadow: 0 8px 0 #d4a017, 0 12px 40px rgba(246, 185, 59, 0.4);
            cursor: pointer;
            transition: all 0.1s ease;
            touch-action: manipulation;
            user-select: none;
            min-width: 140px;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .clicker-button:hover { transform: translateY(-2px); box-shadow: 0 10px 0 #d4a017, 0 16px 50px rgba(246, 185, 59, 0.5); }
        .clicker-button:active { transform: translateY(6px); box-shadow: 0 2px 0 #d4a017; }

        .clicker-button .icon {
            font-size: 2.4rem;
            line-height: 1;
        }

        .clicker-counter {
            font-size: 2.6rem;
            font-weight: bold;
            color: #2d1f14;
            background: white;
            padding: 8px 30px;
            border-radius: 50px;
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.05), 0 4px 20px rgba(0,0,0,0.04);
            border: 3px solid #dccfc4;
            min-width: 90px;
            transition: all 0.15s;
        }

        .clicker-counter.pop {
            animation: popCounter 0.3s ease;
        }

        @keyframes popCounter {
            0% { transform: scale(1); }
            30% { transform: scale(1.4); color: #f5576c; }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0 12px;
            position: relative;
            z-index: 1;
        }

        .btn {
            border: none;
            border-radius: 50px;
            padding: 18px 16px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #3d2b1a;
            box-shadow: 0 4px 0 #c9b09b, 0 6px 20px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 2px solid rgba(255,255,255,0.5);
            background: #f5e6d3;
            user-select: none;
            touch-action: manipulation;
            min-height: 64px;
            position: relative;
            z-index: 1;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #c9b09b, 0 8px 25px rgba(0,0,0,0.1); }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b89f8a; }

        .btn-green {
            background: linear-gradient(135deg, #a8e6cf, #7bc6a4);
            box-shadow: 0 4px 0 #5a9b7a;
        }
        .btn-green:active { box-shadow: 0 2px 0 #5a9b7a; }

        .btn-blue {
            background: linear-gradient(135deg, #a8d8ea, #7cb8d4);
            box-shadow: 0 4px 0 #4a8fa8;
        }
        .btn-blue:active { box-shadow: 0 2px 0 #4a8fa8; }

        .game-area {
            background: linear-gradient(135deg, #fcf8f0, #f8f0e5);
            border-radius: 40px 15px 40px 15px;
            padding: 18px 14px;
            margin: 12px 0 10px;
            border: 3px solid rgba(253, 203, 110, 0.2);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            position: relative;
            z-index: 1;
            transition: background 0.5s ease;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 5px 0;
        }

        .animal-card {
            background: white;
            border-radius: 30px 8px 30px 8px;
            padding: 12px 6px;
            font-size: 2.4rem;
            box-shadow: 0 4px 0 #dccfc4, 0 8px 25px rgba(0,0,0,0.04);
            border: 3px solid #ede0d2;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            touch-action: manipulation;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 65px;
            position: relative;
            z-index: 1;
            gap: 2px;
        }

        .animal-card .animal-emoji {
            font-size: 2.4rem;
            line-height: 1;
        }

        .animal-card .animal-label {
            font-size: 0.6rem;
            font-weight: bold;
            color: #5a4030;
            background: rgba(255,255,255,0.7);
            padding: 1px 6px;
            border-radius: 10px;
            opacity: 0.8;
            white-space: nowrap;
        }

        .animal-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 0 #dccfc4, 0 12px 30px rgba(0,0,0,0.08);
        }

        .animal-card:active {
            transform: scale(0.92) translateY(2px);
            box-shadow: 0 2px 0 #cbbdb0;
        }

        .animal-card.clicked {
            background: linear-gradient(135deg, #fae5c3, #f5d5a8);
            border-color: #dbb58b;
            box-shadow: 0 0 0 4px #eed3b0, 0 3px 0 #c9af8d;
            transform: scale(1.05);
        }

        .animal-card .sound-name {
            font-size: 0.5rem;
            color: #8a7a6a;
            background: rgba(255,255,255,0.5);
            padding: 0 4px;
            border-radius: 8px;
            opacity: 0.6;
            white-space: nowrap;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .animal-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .animal-card:hover::after { opacity: 1; }

        .rating-section {
            background: linear-gradient(135deg, #f8f0e3, #f5e8d5);
            border-radius: 40px 15px 40px 15px;
            padding: 16px 15px;
            margin: 12px 0 10px;
            border: 3px solid rgba(253, 203, 110, 0.3);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 1;
            transition: background 0.5s ease;
        }

        .rating-title {
            font-size: 1rem;
            font-weight: bold;
            color: #5a4030;
            margin-bottom: 10px;
        }

        .rating-buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .rating-btn {
            background: white;
            border: 3px solid #dccfc4;
            border-radius: 60px;
            padding: 12px 30px;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 0 #dccfc4;
        }

        .rating-btn .label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #5a4030;
        }

        .rating-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 0 #dccfc4;
        }

        .rating-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #dccfc4;
        }

        .rating-btn.like.active {
            background: linear-gradient(135deg, #a8e6cf, #7bc6a4);
            border-color: #5a9b7a;
            box-shadow: 0 4px 15px rgba(90, 155, 122, 0.4);
            transform: scale(1.05);
        }

        .rating-btn.dislike.active {
            background: linear-gradient(135deg, #f8d5d5, #f0b8b8);
            border-color: #c98a8a;
            box-shadow: 0 4px 15px rgba(201, 138, 138, 0.4);
            transform: scale(1.05);
        }

        .rating-btn .count {
            font-size: 0.8rem;
            background: rgba(0,0,0,0.05);
            padding: 0 8px;
            border-radius: 20px;
            color: #5a4030;
        }

        /* ===== ДОСТИЖЕНИЯ ===== */
        .achievements-section {
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 30px;
            position: relative;
            z-index: 1;
        }

        .achievement-badge {
            display: inline-block;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.8);
            padding: 4px 12px;
            border-radius: 20px;
            margin: 3px;
            opacity: 0.5;
            transition: all 0.5s;
            border: 2px solid transparent;
        }

        .achievement-badge.unlocked {
            opacity: 1;
            border-color: #f5576c;
            background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
            animation: achievementPop 0.5s ease;
        }

        @keyframes achievementPop {
            0% { transform: scale(0) rotate(-10deg); }
            50% { transform: scale(1.3) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .footer {
            margin-top: 12px;
            font-size: 1.4rem;
            color: #5a4030;
            background: linear-gradient(135deg, #f5e6d3, #f0dcc8);
            padding: 14px 20px;
            border-radius: 50px;
            border: 3px solid rgba(253, 203, 110, 0.2);
            box-shadow: 0 4px 0 #d4bfae;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
            position: relative;
            z-index: 1;
        }

        .footer:hover { transform: scale(1.02); box-shadow: 0 6px 0 #d4bfae; }
        .footer:active { transform: scale(0.97); }

        /* ===== ПАРЯЩИЕ СЕРДЕЧКИ ===== */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 2rem;
            animation: heartFloat linear forwards;
            opacity: 0;
        }

        @keyframes heartFloat {
            0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        /* ===== КОНФЕТТИ ===== */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 12px;
            height: 12px;
            top: -20px;
            animation: confettiFall linear forwards;
            transform-origin: center;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg) scale(1) skew(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) scale(0.3) skew(20deg); opacity: 0; }
        }

        /* ===== ВСПЛЫВАЮЩЕЕ СООБЩЕНИЕ ===== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1.2rem;
            z-index: 10000;
            transition: transform 0.5s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 400px) {
            .card { padding: 20px 14px 25px; }
            h1 { font-size: 2rem; }
            .subhead { font-size: 1.1rem; padding: 6px 18px; }
            .emoji-big { font-size: 3rem; }
            .message { font-size: 1.2rem; padding: 14px 16px; }
            .message span { font-size: 2rem; padding: 0 10px; }
            .btn { font-size: 1.1rem; padding: 12px 10px; min-height: 54px; }
            .animal-card { font-size: 1.8rem; padding: 8px 4px; min-height: 55px; }
            .animal-card .animal-emoji { font-size: 1.8rem; }
            .animal-card .animal-label { font-size: 0.5rem; }
            .animal-card .sound-name { font-size: 0.4rem; }
            .footer { font-size: 1.1rem; padding: 10px 14px; }
            .clicker-button { font-size: 1.4rem; padding: 12px 20px; min-width: 100px; }
            .clicker-button .icon { font-size: 1.8rem; }
            .clicker-counter { font-size: 2rem; padding: 6px 18px; min-width: 60px; }
            .clicker-title { font-size: 1rem; }
            .game-grid { gap: 8px; }
            .rating-btn { padding: 10px 20px; font-size: 1.6rem; }
            .rating-btn .label { font-size: 0.75rem; }
            .rating-buttons { gap: 15px; }
            .rating-title { font-size: 0.85rem; }
            .top-btn { font-size: 0.8rem; padding: 4px 10px; }
            .achievement-badge { font-size: 0.6rem; padding: 2px 8px; }
            .toast { font-size: 1rem; padding: 8px 16px; }
        }

        @media (max-width: 350px) {
            .game-grid { gap: 5px; }
            .animal-card { font-size: 1.4rem; min-height: 45px; }
            .animal-card .animal-emoji { font-size: 1.4rem; }
            .animal-card .animal-label { font-size: 0.4rem; }
            .animal-card .sound-name { font-size: 0.35rem; }
            .btn-group { gap: 6px; }
            .btn { font-size: 0.95rem; padding: 10px 8px; min-height: 48px; }
            .clicker-button { font-size: 1.2rem; padding: 10px 16px; min-width: 80px; }
            .clicker-button .icon { font-size: 1.5rem; }
            .clicker-counter { font-size: 1.6rem; padding: 4px 14px; min-width: 50px; }
            .rating-btn { padding: 8px 14px; font-size: 1.3rem; }
            .rating-btn .label { font-size: 0.65rem; }
            .rating-buttons { gap: 10px; }
            .top-btn { font-size: 0.7rem; padding: 3px 8px; }
        }

        @media (min-width: 768px) {
            .card { max-width: 550px; padding: 40px 35px 45px; }
            h1 { font-size: 3.4rem; }
            .subhead { font-size: 1.6rem; padding: 10px 32px; }
            .emoji-big { font-size: 5rem; }
            .message { font-size: 1.8rem; padding: 22px 28px; }
            .message span { font-size: 2.8rem; padding: 0 20px; }
            .btn { font-size: 1.5rem; padding: 18px 24px; min-height: 70px; }
            .animal-card { font-size: 3rem; padding: 14px 10px; min-height: 85px; }
            .animal-card .animal-emoji { font-size: 3rem; }
            .animal-card .animal-label { font-size: 0.7rem; }
            .animal-card .sound-name { font-size: 0.6rem; }
            .footer { font-size: 1.6rem; padding: 16px 24px; }
            .clicker-button { font-size: 2.2rem; padding: 20px 40px; min-width: 180px; }
            .clicker-button .icon { font-size: 3rem; }
            .clicker-counter { font-size: 3.2rem; padding: 10px 40px; min-width: 100px; }
            .clicker-title { font-size: 1.4rem; }
            .game-grid { gap: 14px; }
            .rating-btn { padding: 16px 40px; font-size: 2.6rem; }
            .rating-btn .label { font-size: 1.1rem; }
            .rating-buttons { gap: 35px; }
            .rating-title { font-size: 1.2rem; }
            .top-btn { font-size: 1.1rem; padding: 8px 18px; }
            .achievement-badge { font-size: 1rem; padding: 6px 16px; }
            .toast { font-size: 1.4rem; padding: 16px 32px; }
        }
    </style>
</head>
<body>

<div class="floating-balls" id="floatingBalls"></div>
<div class="floating-hearts" id="floatingHearts"></div>
<div class="confetti-container" id="confettiContainer"></div>
<div class="toast" id="toast"></div>

<div class="card" id="mainCard">
    <!-- ТОП-ПАНЕЛЬ -->
    <div class="top-bar">
        <button class="top-btn" id="nightModeBtn">🌙 Ночь</button>
        <button class="top-btn" id="musicBtn">🎵 Музыка</button>
    </div>

    <h1 id="titleBirthday">🎂 С ДНЁМ РОЖДЕНИЯ! 🎂</h1>
    <div class="subhead" id="subheadBrother">⭐ Моему любимому брату! ⭐</div>
    <div class="emoji-big" id="emojiBig">
        <span>🎈</span>
        <span>🎁</span>
        <span>🌟</span>
    </div>

    <div class="message" id="messageAge">
        Тебе уже <span>5</span> лет! <br>
        Ты самый сильный и умный! 🦸‍♂️
    </div>

    <div class="clicker-section">
        <div class="clicker-title">💎 Нажимай на монетку!</div>
        <div class="clicker-display">
            <button class="clicker-button" id="clickerButton">
                <span class="icon">💎</span> ЖМИ!
            </button>
            <div class="clicker-counter" id="clickerCounter">0</div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-green" id="btnClap">👏 Хлопай</button>
        <button class="btn btn-blue" id="btnJump">🦘 Прыгай</button>
    </div>

    <div class="game-area">
        <div class="game-grid" id="animalGrid">
            <div class="animal-card" data-animal="🐶">
                <span class="animal-emoji">🐶</span>
                <span class="animal-label">Собака</span>
                <span class="sound-name">гав-гав</span>
            </div>
            <div class="animal-card" data-animal="🐱">
                <span class="animal-emoji">🐱</span>
                <span class="animal-label">Кот</span>
                <span class="sound-name">мяу-мяу</span>
            </div>
            <div class="animal-card" data-animal="🐭">
                <span class="animal-emoji">🐭</span>
                <span class="animal-label">Мышка</span>
                <span class="sound-name">пи-пи-пи</span>
            </div>
            <div class="animal-card" data-animal="🐘">
                <span class="animal-emoji">🐘</span>
                <span class="animal-label">Слоник</span>
                <span class="sound-name">тру-у-у</span>
            </div>
        </div>
        <div class="game-hint" id="gameFeedback"></div>
    </div>

    <!-- ДОСТИЖЕНИЯ -->
    <div class="achievements-section" id="achievementsSection">
        <span class="achievement-badge" id="achClicker">💎 10 кликов</span>
        <span class="achievement-badge" id="achAnimals">🐾 Все животные</span>
        <span class="achievement-badge" id="achLike">❤️ Поставил лайк</span>
        <span class="achievement-badge" id="achAll">🏆 ВСЁ ВЫПОЛНЕНО!</span>
    </div>

    <div class="rating-section">
        <div class="rating-title">❤️ Тебе нравится? Оцени!</div>
        <div class="rating-buttons">
            <button class="rating-btn like" id="likeBtn">
                👍 <span class="label">Лайк</span>
                <span class="count" id="likeCount">0</span>
            </button>
            <button class="rating-btn dislike" id="dislikeBtn">
                👎 <span class="label">Дизлайк</span>
                <span class="count" id="dislikeCount">0</span>
            </button>
        </div>
    </div>

    <div class="footer" id="footerLove">
        ❤️ Твой старший брат ❤️
    </div>
</div>

<script>
    (function() {
        // ====== ПЛАВАЮЩИЕ ШАРИКИ ======
        function createFloatingBalls() {
            const container = document.getElementById('floatingBalls');
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#1dd1a1', '#f368e0'];
            
            for (let i = 0; i < 15; i++) {
                const ball = document.createElement('div');
                ball.className = 'ball';
                const size = Math.random() * 60 + 30;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                const duration = Math.random() * 20 + 15;
                const delay = Math.random() * 20;
                
                ball.style.cssText = `
                    left: ${left}%;
                    width: ${size}px;
                    height: ${size}px;
                    background: ${color};
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                `;
                container.appendChild(ball);
            }
        }
        createFloatingBalls();

        // ====== КОНФЕТТИ ======
        const confettiContainer = document.getElementById('confettiContainer');
        const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#1dd1a1', '#f368e0', '#ff9f43', '#00d2d3'];

        function createConfetti(count = 100) {
            for (let i = 0; i < count; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                const size = Math.random() * 12 + 6;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                const duration = Math.random() * 2.5 + 2;
                const delay = Math.random() * 1.5;
                const shapes = ['50%', '0', '3px'];
                const borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
                
                piece.style.cssText = `
                    left: ${left}%;
                    width: ${size}px;
                    height: ${size * (Math.random() * 0.8 + 0.4)}px;
                    background: ${color};
                    border-radius: ${borderRadius};
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                `;
                confettiContainer.appendChild(piece);
            }
            
            setTimeout(() => {
                confettiContainer.innerHTML = '';
            }, 4500);
        }

        // ====== СЕРДЕЧКИ ======
        const heartsContainer = document.getElementById('floatingHearts');
        
        function createHearts(count = 10) {
            const heartSymbols = ['❤️', '🧡', '💛', '💚', '💙', '💜', '🩷', '❤️‍🔥'];
            for (let i = 0; i < count; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                const symbol = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                const size = Math.random() * 2 + 1.5;
                const left = Math.random() * 100;
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 0.5;
                const xOffset = (Math.random() - 0.5) * 100;
                
                heart.textContent = symbol;
                heart.style.cssText = `
                    left: ${left}%;
                    font-size: ${size}rem;
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                    --x-offset: ${xOffset}px;
                `;
                heartsContainer.appendChild(heart);
            }
            
            setTimeout(() => {
                heartsContainer.innerHTML = '';
            }, 5000);
        }

        // ====== ТОСТ ======
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // ====== ФОНОВАЯ МУЗЫКА ======
        let isMusicPlaying = false;
        let musicAudio = null;

        function toggleMusic() {
            if (isMusicPlaying) {
                if (musicAudio) {
                    musicAudio.pause();
                    musicAudio.currentTime = 0;
                }
                isMusicPlaying = false;
                document.getElementById('musicBtn').textContent = '🎵 Музыка';
                showToast('🎵 Музыка выключена');
            } else {
                try {
                    musicAudio = new Audio('audio/background.mp3');
                    musicAudio.loop = true;
                    musicAudio.volume = 0.3;
                    musicAudio.play().then(() => {
                        isMusicPlaying = true;
                        document.getElementById('musicBtn').textContent = '🎵 Стоп';
                        showToast('🎵 Музыка включена!');
                    }).catch(() => {
                        showToast('❌ Файл background.mp3 не найден');
                    });
                } catch (e) {
                    showToast('❌ Ошибка загрузки музыки');
                }
            }
        }

        document.getElementById('musicBtn').addEventListener('click', toggleMusic);

        // ====== НОЧНОЙ РЕЖИМ ======
        let isNightMode = false;
        document.getElementById('nightModeBtn').addEventListener('click', function() {
            isNightMode = !isNightMode;
            document.body.classList.toggle('night-mode');
            this.textContent = isNightMode ? '☀️ День' : '🌙 Ночь';
            showToast(isNightMode ? '🌙 Ночной режим включён' : '☀️ Дневной режим включён');
            if (isNightMode) {
                createConfetti(30);
            }
        });

        // ====== ДОСТИЖЕНИЯ ======
        let achievements = {
            clicker: false,
            animals: false,
            like: false,
            all: false
        };

        let animalClickCount = 0;
        const totalAnimals = 4;

        function checkAchievements() {
            const achClicker = document.getElementById('achClicker');
            const achAnimals = document.getElementById('achAnimals');
            const achLike = document.getElementById('achLike');
            const achAll = document.getElementById('achAll');

            if (clickCount >= 10 && !achievements.clicker) {
                achievements.clicker = true;
                achClicker.classList.add('unlocked');
                showToast('💎 Достижение: 10 кликов!');
                createConfetti(40);
                createHearts(15);
            }

            if (animalClickCount >= totalAnimals && !achievements.animals) {
                achievements.animals = true;
                achAnimals.classList.add('unlocked');
                showToast('🐾 Достижение: Все животные!');
                createConfetti(50);
                createHearts(20);
            }

            if (userVote === 'like' && !achievements.like) {
                achievements.like = true;
                achLike.classList.add('unlocked');
                showToast('❤️ Достижение: Поставил лайк!');
                createConfetti(40);
                createHearts(15);
            }

            if (achievements.clicker && achievements.animals && achievements.like && !achievements.all) {
                achievements.all = true;
                achAll.classList.add('unlocked');
                showToast('🏆 ВСЕ ДОСТИЖЕНИЯ ПОЛУЧЕНЫ! ТЫ ГЕНИЙ! 🎉');
                createConfetti(150);
                createHearts(40);
            }
        }

        // ====== ВСПЛЫВАЮЩИЕ СМАЙЛИКИ ======
        function createFloatingEmoji(emoji, count = 8) {
            const container = document.getElementById('floatingHearts');
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'heart';
                const size = Math.random() * 1.5 + 1;
                const left = Math.random() * 100;
                const duration = Math.random() * 2.5 + 2;
                const delay = Math.random() * 0.5;
                el.textContent = emoji;
                el.style.cssText = `
                    left: ${left}%;
                    font-size: ${size}rem;
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                `;
                container.appendChild(el);
            }
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // ====== ЗВУКИ ======
        function playSound(audioFileName) {
            const audioPath = 'audio/' + audioFileName;
            const audio = new Audio();
            audio.src = audioPath;
            audio.play().catch(() => {});
        }

        const audioFiles = {
            'Happy birthday': 'Happy birthday.mp3',
            'To my beloved brother': 'To my beloved brother.mp3',
            'You are already 5 years old': 'You are already 5 years old.mp3',
            'Clap clap well done': 'Clap clap well done.mp3',
            'prag skok': 'prag skok.mp3',
            'coin': 'coin.mp3',
            'dog': 'dog.mp3',
            'cat': 'cat.mp3',
            'mouse': 'mouse.mp3',
            'elephant': 'elephant.mp3'
        };

        // ====== КЛИКЕР ======
        let clickCount = 0;
        const clickerButton = document.getElementById('clickerButton');
        const clickerCounter = document.getElementById('clickerCounter');

        clickerButton.addEventListener('click', function() {
            clickCount++;
            clickerCounter.textContent = clickCount;
            
            clickerCounter.classList.remove('pop');
            void clickerCounter.offsetWidth;
            clickerCounter.classList.add('pop');
            
            playSound(audioFiles['coin']);
            createConfetti(70);
            createHearts(5);
            
            if (clickCount % 5 === 0) {
                createFloatingEmoji('⭐', 5);
            }
            
            this.style.transform = 'scale(0.9)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);
            
            checkAchievements();
        });

        // ====== КЛИКИ НА ЭЛЕМЕНТЫ ======
        document.getElementById('titleBirthday').addEventListener('click', function() {
            playSound(audioFiles['Happy birthday']);
            createConfetti(60);
            createHearts(10);
            createFloatingEmoji('🎂', 5);
        });

        document.getElementById('subheadBrother').addEventListener('click', function() {
            playSound(audioFiles['To my beloved brother']);
            createHearts(5);
        });

        document.getElementById('emojiBig').addEventListener('click', function() {
            playSound(audioFiles['Happy birthday']);
            createConfetti(50);
            createHearts(8);
            createFloatingEmoji('🎈', 5);
        });

        document.getElementById('messageAge').addEventListener('click', function() {
            playSound(audioFiles['You are already 5 years old']);
            createHearts(5);
        });

        document.getElementById('btnClap').addEventListener('click', function() {
            playSound(audioFiles['Clap clap well done']);
            createFloatingEmoji('👏', 6);
        });

        document.getElementById('btnJump').addEventListener('click', function() {
            playSound(audioFiles['prag skok']);
            createFloatingEmoji('🦘', 6);
        });

        // ====== ЖИВОТНЫЕ ======
        const animalData = {
            '🐶': { audio: 'dog', label: 'Собака', sound: 'гав-гав', emoji: '🐶' },
            '🐱': { audio: 'cat', label: 'Кот', sound: 'мяу-мяу', emoji: '🐱' },
            '🐭': { audio: 'mouse', label: 'Мышка', sound: 'пи-пи-пи', emoji: '🐭' },
            '🐘': { audio: 'elephant', label: 'Слоник', sound: 'тру-у-у', emoji: '🐘' }
        };

        const animalCards = document.querySelectorAll('.animal-card');
        const clickedAnimals = new Set();

        animalCards.forEach(card => {
            card.addEventListener('click', function() {
                animalCards.forEach(c => c.classList.remove('clicked'));
                this.classList.add('clicked');

                const animalEmoji = this.dataset.animal || this.textContent.trim();
                const data = animalData[animalEmoji];
                
                if (data) {
                    playSound(audioFiles[data.audio]);
                    
                    // Сердечки и эмодзи
                    createHearts(12);
                    createFloatingEmoji('❤️', 6);
                    
                    // Запоминаем животных
                    if (!clickedAnimals.has(animalEmoji)) {
                        clickedAnimals.add(animalEmoji);
                        animalClickCount = clickedAnimals.size;
                        checkAchievements();
                    }
                }

                this.style.transform = 'scale(1.15)';
                setTimeout(() => { this.style.transform = ''; }, 200);
            });
        });

        // ====== ЛАЙК / ДИЗЛАЙК ======
        let likeCount = 0;
        let dislikeCount = 0;
        let userVote = null;

        const likeBtn = document.getElementById('likeBtn');
        const dislikeBtn = document.getElementById('dislikeBtn');
        const likeCountEl = document.getElementById('likeCount');
        const dislikeCountEl = document.getElementById('dislikeCount');

        function updateRating() {
            likeCountEl.textContent = likeCount;
            dislikeCountEl.textContent = dislikeCount;
            
            likeBtn.classList.remove('active');
            dislikeBtn.classList.remove('active');
            
            if (userVote === 'like') {
                likeBtn.classList.add('active');
            } else if (userVote === 'dislike') {
                dislikeBtn.classList.add('active');
            }
        }

        likeBtn.addEventListener('click', function() {
            if (userVote === 'like') {
                userVote = null;
                likeCount--;
                showToast('👍 Лайк отменён');
            } else {
                if (userVote === 'dislike') {
                    dislikeCount--;
                }
                userVote = 'like';
                likeCount++;
                createConfetti(50);
                createHearts(15);
                createFloatingEmoji('❤️', 10);
                playSound(audioFiles['coin']);
                showToast('👍 Ты поставил ЛАЙК!');
                checkAchievements();
            }
            updateRating();
        });

        dislikeBtn.addEventListener('click', function() {
            if (userVote === 'dislike') {
                userVote = null;
                dislikeCount--;
                showToast('👎 Дизлайк отменён');
            } else {
                if (userVote === 'like') {
                    likeCount--;
                }
                userVote = 'dislike';
                dislikeCount++;
                showToast('👎 Ты поставил ДИЗЛАЙК');
            }
            updateRating();
        });

        document.getElementById('footerLove').addEventListener('click', function() {
            playSound(audioFiles['To my beloved brother']);
            createHearts(8);
        });

        // ====== СЕКРЕТНАЯ КОМБИНАЦИЯ ======
        let secretCounter = 0;
        document.addEventListener('click', function() {
            secretCounter++;
            if (secretCounter === 20) {
                secretCounter = 0;
                createConfetti(200);
                createHearts(30);
                createFloatingEmoji('🎉', 15);
                showToast('🎉 СЕКРЕТНЫЙ ДОЖДЬ! 20 КЛИКОВ!');
            }
        });

        // ====== ЗАПУСК ======
        window.addEventListener('load', function() {
            console.log('🎉 С ДНЁМ РОЖДЕНИЯ!');
            console.log('💎 Нажми на монетку!');
            console.log('❤️ Оцени страницу!');
            console.log('🌙 Нажми на "Ночь" для тёмной темы');
            console.log('🎵 Нажми на "Музыка" для фоновой мелодии');
            showToast('🎉 С ДНЁМ РОЖДЕНИЯ, БРАТ!');
            setTimeout(() => {
                createConfetti(40);
            }, 500);
        });

    })();
</script>

</body>
</html>
